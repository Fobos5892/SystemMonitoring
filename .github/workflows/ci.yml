name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Qt ${{ matrix.qt-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - qt-version: '5.15.2'
          - qt-version: '6.5.3'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libglib2.0-dev \
            libxkbcommon-dev \
            libxcb-xinerama0

      - name: Install Qt 5.15
        if: matrix.qt-version == '5.15.2'
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          arch: gcc_64
          cache: true

      - name: Install Qt 6
        if: matrix.qt-version == '6.5.3'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          arch: gcc_64
          cache: true

      - name: Build and test
        run: python scripts/build.py tests --release --run-tests
